    <!-- Profile form -->
    <div class="profile-body">
        <div class="profile-card">
            <h2>Your Profile</h2>

            <form id="settingsForm" novalidate>
                <!-- Name -->
                <div class="field">
                    <label for="name">
                        Name
                        <span class="error-text" id="name-error"></span>
                    </label>
                    <input type="text" id="name" placeholder="Enter your name" required>
                </div>

                <!-- Target Calories -->
                <div class="field">
                    <label for="targetCalories">
                        Daily Calorie Target
                        <span class="error-text" id="targetCalories-error"></span>
                    </label>
                    <input type="number" id="targetCalories" placeholder="e.g. 2000" min="0" max="5000">
                </div>

                <!-- Allergies -->
                <h3 class="section-title">Allergies</h3>
                <div class="checkbox-group" id="allergyGroup">
                    <label>
                        <input type="checkbox" value="milk" name="allergies">
                        Milk
                    </label>
                    <label>
                        <input type="checkbox" value="eggs" name="allergies">
                        Eggs
                    </label>
                    <label>
                        <input type="checkbox" value="peanuts" name="allergies">
                        Peanuts
                    </label>
                    <label>
                        <input type="checkbox" value="gluten" name="allergies">
                        Gluten
                    </label>
                    <label>
                        <input type="checkbox" value="soy" name="allergies">
                        Soy
                    </label>
                    <input class="other-input" id="Allergies" placeholder="Other allergies (comma-separated)..." aria-label="Other allergies">
                </div>

                <!-- Preferences -->
                <h3 class="section-title">Dietary Preferences</h3>
                <div class="checkbox-group" id="prefGroup">
                    <label>
                        <input type="checkbox" value="vegan" name="preferences">
                        Vegan
                    </label>
                    <label>
                        <input type="checkbox" value="vegetarian" name="preferences">
                        Vegetarian
                    </label>
                    <label>
                        <input type="checkbox" value="keto" name="preferences">
                        Keto
                    </label>
                    <label>
                        <input type="checkbox" value="low-carb" name="preferences">
                        Low Carb
                    </label>
                    <label>
                        <input type="checkbox" value="high-protein" name="preferences">
                        High Protein
                    </label>
                </div>

                <button class="save-btn" type="submit" id="saveButton">
                    Save Changes
                </button>
                <div id="save-message" class="save-message" role="alert" aria-live="polite"></div>
            </form>
        </div>
    </div>
