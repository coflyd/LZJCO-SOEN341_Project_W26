<!DOCTYPE html>

<head>

    <link rel="stylesheet" href="./SearchRecipes.css">
</head>

<body>

    <header>
    <div class="hamburger" id="hamburger"><div></div><div></div><div></div></div>
    <div class="nav-overlay" id="navOverlay"></div>
    <nav class="nav-dropdown" id="navDropdown">
        <a href="../HomePage.html">
            <div class="nav-icon"><svg viewBox="0 0 24 24"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg></div>Home Page
        </a>
        <a href="../Profile Managment/ProfileManagement.html" class="nav-profile">
            <div class="nav-icon"><svg viewBox="0 0 24 24"><path d="M12 12c2.7 0 4.8-2.1 4.8-4.8S14.7 2.4 12 2.4 7.2 4.5 7.2 7.2 9.3 12 12 12zm0 2.4c-3.2 0-9.6 1.6-9.6 4.8v2.4h19.2v-2.4c0-3.2-6.4-4.8-9.6-4.8z"/></svg></div>Profile
        </a>
        <a href="./SearchRecipes.html">
            <div class="nav-icon"><svg viewBox="0 0 24 24"><path d="M9 21c0 .5.4 1 1 1h4c.6 0 1-.5 1-1v-1H9v1zm3-19C8.1 2 5 5.1 5 9c0 2.4 1.2 4.5 3 5.7V17c0 .5.4 1 1 1h6c.6 0 1-.5 1-1v-2.3c1.8-1.3 3-3.4 3-5.7 0-3.9-3.1-7-7-7z"/></svg></div>Inspirations
        </a>
        <a href="../Weekly Planner/WeeklyPlanner.html">
            <div class="nav-icon"><svg viewBox="0 0 24 24"><path d="M19 3h-1V1h-2v2H8V1H6v2H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm0 16H5V8h14v11zM7 10h5v5H7z"/></svg></div>Your Schedule

        <a href="../LLM Pipeline/fridge.html">
            <div class="nav-icon"><svg viewBox="0 0 24 24"><path d="M18 2H6c-1.1 0-2 .9-2 2v16c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2zm0 18H6v-9h12v9zm0-11H6V4h12v5zM8 5h2v3H8V5zm0 7h2v5H8v-5z"/></svg></div>Your Fridge

        <div class="logo">MEAL | MAJOR | PREP</div>
        <div style="width:48px"></div>
    </header>

    <!-- Recipes Body -->
    <div class="recipes-body">
        <div class="container">
            <div class="page-header">
                <h1>Your Recipe Collection</h1>
                <p>Search, filter, and manage all your recipes</p>
            </div>

            <!-- Search and Filter Bar -->
            <div class="search-bar-container">
                <div class="search-row">
                    <div class="search-input-wrapper">
                        <span class="search-icon">🔍</span>
                        <input type="text" id="searchInput" class="search-input" placeholder="Search recipes by name or ingredient...">
                    </div>
                    <a href="CreateRecipes.html" class="add-recipe-btn">+ Add Recipe</a>
                </div>

                <div class="filters-row">
                    <div class="filter-group">
                        <label>Servings</label>
                        <select id="servingsFilter" class="filter-select">
                            <option value="">All</option>
                            <option value="1-2">1-2 servings</option>
                            <option value="3-4">3-4 servings</option>
                            <option value="5-6">5-6 servings</option>
                            <option value="7+">7+ servings</option>
                        </select>
                    </div>

                    <div class="filter-group">
                        <label>Prep Time</label>
                        <select id="prepTimeFilter" class="filter-select">
                            <option value="">All</option>
                            <option value="0-15">0-15 min</option>
                            <option value="16-30">16-30 min</option>
                            <option value="31-60">31-60 min</option>
                            <option value="61+">60+ min</option>
                        </select>
                    </div>

                    <div class="filter-group">
                        <label>Total Time</label>
                        <select id="totalTimeFilter" class="filter-select">
                            <option value="">All</option>
                            <option value="0-30">Under 30 min</option>
                            <option value="31-60">30-60 min</option>
                            <option value="61-90">60-90 min</option>
                            <option value="91+">90+ min</option>
                        </select>
                    </div>

                    <div class="filter-group">
                        <label>Sort By</label>
                        <select id="sortFilter" class="filter-select">
                            <option value="name">Name (A-Z)</option>
                            <option value="name-desc">Name (Z-A)</option>
                            <option value="time-asc">Time (Low to High)</option>
                            <option value="time-desc">Time (High to Low)</option>
                            <option value="servings-asc">Servings (Low to High)</option>
                            <option value="servings-desc">Servings (High to Low)</option>
                        </select>
                    </div>

                    <!-- Category Filter Checkboxes (Task 15 - Zaree) -->
                    <div class="filter-group category-filters">
                        <label>Category</label>
                        <div class="checkbox-filters">
                            <label class="checkbox-item">
                                <input type="checkbox" class="category-checkbox" value="main-course">
                                <span>🍗 Main Course</span>
                            </label>
                            <label class="checkbox-item">
                                <input type="checkbox" class="category-checkbox" value="dessert">
                                <span>🍰 Dessert</span>
                            </label>
                            <label class="checkbox-item">
                                <input type="checkbox" class="category-checkbox" value="breakfast">
                                <span>🍳 Breakfast</span>
                            </label>
                            <label class="checkbox-item">
                                <input type="checkbox" class="category-checkbox" value="entree">
                                <span>🥗 Entree</span>
                            </label>
                            <label class="checkbox-item">
                                <input type="checkbox" class="category-checkbox" value="beverage">
                                <span>🥤 Beverage</span>
                            </label>
                        </div>
                    </div>
                </div>

                <button class="clear-filters-btn" onclick="clearFilters()">Clear All Filters</button>
            </div>

            <!-- Recipes Grid -->
            <div id="recipesGrid" class="recipes-grid">
                <div class="loading">Loading recipes...</div>
            </div>
        </div>
    </div>

    <!-- Load search recipes script -->
    <script src="./searchRecipes.helpers.js"></script>
    <script type="module" src="./searchRecipes.js"></script>
    <script>
        const hamburger=document.getElementById('hamburger');
        const navDropdown=document.getElementById('navDropdown');
        const navOverlay=document.getElementById('navOverlay');
        hamburger.addEventListener('click',()=>{hamburger.classList.toggle('open');navDropdown.classList.toggle('open');navOverlay.classList.toggle('open');});
        navOverlay.addEventListener('click',()=>{hamburger.classList.remove('open');navDropdown.classList.remove('open');navOverlay.classList.remove('open');});
    </script>
</body>
</html>
