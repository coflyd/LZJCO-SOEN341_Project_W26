<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weekly Meal Plan</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="WeeklyPlannerStyle.css">
</head>
<body>
 <!-- Header -->
    <header>
        <img src="../Assets/LOGO_MP.png" class="header-logo" alt="MealMajor Logo">
        <span class="header-title">MEAL | MAJOR | PREP</span>
        <a href="../HomePage.html" class="home-btn">Home Page</a>
    </header>


<div class="meal-plan-page">    
    <div class="page-header">
        <h1><i class="fas fa-calendar-week" style="color:var(--primary);margin-right:10px"></i>Weekly <span>Meal Plan</span></h1>
        <div class="week-start-toggle">
            <span>Week starts:</span>
            <div class="toggle-btn" id="weekStartToggle">
                <span data-value="sun" class="active">Sun</span>
                <span data-value="mon">Mon</span>
            </div>
        </div>
    </div>

    <!-- Week navigation -->
    <div class="week-nav">
        <button class="nav-arrow" id="prevWeek" title="Previous week"><i class="fas fa-chevron-left"></i></button>
        <span class="week-label" id="weekLabel"></span>
        <button class="nav-arrow" id="nextWeek" title="Next week"><i class="fas fa-chevron-right"></i></button>
        <button class="today-btn" id="todayBtn">Today</button>
        <button class="reuse-btn" id="reuseLastWeekBtn" title="Copy all meals from last week">
            <i class="fas fa-rotate-left"></i> Reuse Last Week
        </button>
    </div>

    <!-- Legend -->
    <div class="legend">
        <div class="legend-item"><div class="legend-dot breakfast"></div> Breakfast</div>
        <div class="legend-item"><div class="legend-dot lunch"></div> Lunch</div>
        <div class="legend-item"><div class="legend-dot dinner"></div> Dinner</div>
        <div class="legend-item"><div class="legend-dot snack"></div> Snack</div>
    </div>

    <!-- 7-day grid -->
    <div class="week-grid" id="weekGrid"></div>
</div>

<!-- Side panel overlay -->
<div class="panel-overlay" id="panelOverlay"></div>

<!-- Side panel -->
<div class="side-panel" id="sidePanel">
    <div class="panel-header">
        <div class="panel-header-info">
            <h2 id="panelDayTitle">Monday</h2>
            <p id="panelDayDate"></p>
        </div>
        <button class="panel-close" id="panelClose"><i class="fas fa-times"></i></button>
    </div>
    <div class="panel-body">
        <!-- filter tabs -->
        <div class="type-tabs" id="typeTabs">
            <button class="type-tab active" data-filter="all">All</button>
            <button class="type-tab" data-filter="breakfast">Breakfast</button>
            <button class="type-tab" data-filter="lunch">Lunch</button>
            <button class="type-tab" data-filter="dinner">Dinner</button>
            <button class="type-tab" data-filter="snack">Snack</button>
        </div>

        <!-- meals list -->
        <div class="panel-meals" id="panelMeals"></div>

        <!-- add meal button -->
        <button class="add-meal-trigger" id="showAddForm">
            <i class="fas fa-plus-circle"></i> Add Meal
        </button>

        <!-- add / edit form -->
        <div class="meal-form" id="mealForm" style="display:none;margin-top:14px">
            <h3 id="formTitle">Add Meal</h3>
            <input type="hidden" id="editMealId">
            
            <!-- Duplicate warning -->
            <div class="duplicate-warning" id="duplicateWarning">
                <i class="fas fa-exclamation-triangle"></i> This meal already exists for this day and type!
            </div>
            
            <div class="form-group">
                <label>Meal Name</label>
                <input type="text" id="mealNameInput" placeholder="e.g., Avocado Toast">
            </div>
            <div class="form-group">
                <label>Type</label>
                <select id="mealTypeInput">
                    <option value="breakfast">Breakfast</option>
                    <option value="lunch">Lunch</option>
                    <option value="dinner">Dinner</option>
                    <option value="snack">Snack</option>
                </select>
            </div>
            <div class="form-group">
                <label>Calories</label>
                <input type="number" id="mealCaloriesInput" placeholder="200" value="200" min="0">
            </div>
            <div class="form-actions">
                <button class="btn-primary" id="saveMealBtn">Save Meal</button>
                <button class="btn-secondary" id="cancelFormBtn">Cancel</button>
            </div>
        </div>
    </div>
</div>

<!-- Firebase SDK -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
import { getDatabase, ref, get, set, update, remove, push } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

// Firebase config
const firebaseConfig = {
    apiKey: "AIzaSyDSozt6vIF6RrLQei26G-teUd2cPSTdPIQ",
    authDomain: "louay-testing.firebaseapp.com",
    databaseURL: "https://louay-testing-default-rtdb.firebaseio.com",
    projectId: "louay-testing",
    storageBucket: "louay-testing.firebasestorage.app",
    messagingSenderId: "123255076909",
    appId: "1:123255076909:web:c2ba7c881ed4588b7ba0a4"
};

// Initialize Firebase
const app = initializeApp(firebaseConfig);
const database = getDatabase(app);
const auth = getAuth(app);

// ─────────────────────────────────────────────
//  STATE
// ─────────────────────────────────────────────
const state = {
    weekStartsOn: 'sun',          // 'sun' | 'mon'
    currentWeekOffset: 0,         // 0 = current week
    selectedDate: null,           // 'YYYY-MM-DD'
    activeFilter: 'all',
    currentUser: null,            // Firebase user
    meals: {},                     // { 'YYYY-MM-DD': [ { id, name, type, calories }, ... ] }
    targetCalories: 0
};

// ─────────────────────────────────────────────
//  HELPERS
// ─────────────────────────────────────────────
function uid() {
    return Math.random().toString(36).slice(2) + Date.now().toString(36);
}

function toKey(date) {
    return date.toISOString().slice(0, 10);          // 'YYYY-MM-DD'
}

// Get week ID for Firebase path (e.g., "2026-W12")
function getWeekId(weekOffset = 0) {
    const start = getWeekStart(weekOffset);
    const year = start.getFullYear();
    const firstJan = new Date(year, 0, 1);
    const days = Math.floor((start - firstJan) / (24 * 60 * 60 * 1000));
    const weekNum = Math.ceil((days + firstJan.getDay() + 1) / 7);
    return `${year}-W${String(weekNum).padStart(2, '0')}`;
}

function getWeekStart(weekOffset = 0) {
    const today = new Date();
    today.setHours(0, 0, 0, 0);
    const dow = today.getDay();                      // 0=Sun … 6=Sat
    const diff = state.weekStartsOn === 'sun' ? dow : (dow === 0 ? 6 : dow - 1);
    const start = new Date(today);
    start.setDate(today.getDate() - diff + weekOffset * 7);
    return start;
}

function getWeekDays(weekOffset = 0) {
    const start = getWeekStart(weekOffset);
    return Array.from({ length: 7 }, (_, i) => {
        const d = new Date(start);
        d.setDate(start.getDate() + i);
        return d;
    });
}

const DAY_NAMES  = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
const FULL_DAYS  = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
const MONTH_NAMES = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];

function formatShortDate(d) {
    return `${MONTH_NAMES[d.getMonth()]} ${d.getDate()}`;
}
function formatFullDate(d) {
    return `${FULL_DAYS[d.getDay()]}, ${MONTH_NAMES[d.getMonth()]} ${d.getDate()}, ${d.getFullYear()}`;
}

function isToday(d) {
    const t = new Date(); t.setHours(0,0,0,0);
    return d.getTime() === t.getTime();
}

function escHtml(str) {
    return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ─────────────────────────────────────────────
//  FIREBASE PERSISTENCE
// ─────────────────────────────────────────────

// Get Firebase path for user's weekly planner
function getFirebasePath(weekId) {
    if (!state.currentUser) return null;
    return `users/${state.currentUser.uid}/WeeklyPlanner/${weekId}`;
}

// Save meals to Firebase
async function saveMealsToFirebase() {
    if (!state.currentUser) return;
    
    const weekId = getWeekId(state.currentWeekOffset);
    const path = getFirebasePath(weekId);
    
    try {
        // Convert meals object to Firebase-friendly structure
        const weekMeals = {};
        Object.keys(state.meals).forEach(dateKey => {
            const dayName = getDayNameFromDate(dateKey);
            if (dayName) {
                weekMeals[dayName] = {};
                state.meals[dateKey].forEach(meal => {
                    weekMeals[dayName][meal.id] = {
                        name: meal.name,
                        type: meal.type,
                        calories: meal.calories || 200
                    };
                });
            }
        });
        
        await set(ref(database, path), { days: weekMeals });
        console.log('Meals saved to Firebase:', path);
    } catch (error) {
        console.error('Error saving meals to Firebase:', error);
    }
}

// Load meals from Firebase
async function loadMealsFromFirebase() {
    if (!state.currentUser) return;
    
    const weekId = getWeekId(state.currentWeekOffset);
    const path = getFirebasePath(weekId);
    
    try {
        const snapshot = await get(ref(database, path));
        state.meals = {};
        
        if (snapshot.exists()) {
            const data = snapshot.val();
            const weekDays = getWeekDays(state.currentWeekOffset);
            
            // Convert Firebase structure back to state.meals format
            if (data.days) {
                Object.keys(data.days).forEach(dayName => {
                    const dayIndex = FULL_DAYS.map(d => d.toLowerCase()).indexOf(dayName.toLowerCase());
                    if (dayIndex !== -1) {
                        const dateKey = toKey(weekDays[dayIndex]);
                        state.meals[dateKey] = [];
                        
                        Object.keys(data.days[dayName]).forEach(mealId => {
                            const meal = data.days[dayName][mealId];
                            state.meals[dateKey].push({
                                id: mealId,
                                name: meal.name,
                                type: meal.type,
                                calories: meal.calories || 200
                            });
                        });
                    }
                });
            }
        }
        
        console.log('Meals loaded from Firebase:', path);
        renderGrid();
    } catch (error) {
        console.error('Error loading meals from Firebase:', error);
    }
}

// Get day name from date key
function getDayNameFromDate(dateKey) {
    const date = new Date(dateKey + 'T00:00:00');
    return FULL_DAYS[date.getDay()].toLowerCase();
}

// ─────────────────────────────────────────────
//  MEAL OPERATIONS
// ─────────────────────────────────────────────
function getMeals(dateKey) {
    return state.meals[dateKey] || [];
}

// Check for duplicate meal (same name and type on same day)
function isDuplicateMeal(dateKey, name, type, excludeId = null) {
    const meals = getMeals(dateKey);
    return meals.some(meal => 
        meal.name.toLowerCase() === name.toLowerCase() && 
        meal.type === type && 
        meal.id !== excludeId
    );
}

// Add meal with duplicate check
async function addMeal(dateKey, meal) {
    // Check for duplicates
    if (isDuplicateMeal(dateKey, meal.name, meal.type)) {
        document.getElementById('duplicateWarning').classList.add('show');
        return false;
    }
    
    document.getElementById('duplicateWarning').classList.remove('show');
    
    if (!state.meals[dateKey]) state.meals[dateKey] = [];
    state.meals[dateKey].push(meal);
    
    await saveMealsToFirebase();
    return true;
}

// Update meal
async function updateMeal(dateKey, id, updates) {
    const list = state.meals[dateKey];
    if (!list) return false;
    
    // Check for duplicates (excluding current meal)
    if (isDuplicateMeal(dateKey, updates.name, updates.type, id)) {
        document.getElementById('duplicateWarning').classList.add('show');
        return false;
    }
    
    document.getElementById('duplicateWarning').classList.remove('show');
    
    const idx = list.findIndex(m => m.id === id);
    if (idx !== -1) {
        list[idx] = { ...list[idx], ...updates };
        await saveMealsToFirebase();
        return true;
    }
    return false;
}

// Remove meal
async function removeMeal(dateKey, id) {
    if (!state.meals[dateKey]) return;
    state.meals[dateKey] = state.meals[dateKey].filter(m => m.id !== id);
    await saveMealsToFirebase();
}

// ─────────────────────────────────────────────
//  RENDER GRID
// ─────────────────────────────────────────────
function renderGrid() {
    const grid = document.getElementById('weekGrid');
    grid.innerHTML = '';

    const days = getWeekDays(state.currentWeekOffset);
    const start = days[0], end = days[6];

    document.getElementById('weekLabel').textContent =
        `${formatShortDate(start)} – ${formatShortDate(end)}`;

    days.forEach(day => {
        const key = toKey(day);
        const meals = getMeals(key).slice(0, 4);
        const totalCal = getTotalCalories(key);
        const isOverLimit = state.targetCalories > 0 && totalCal > state.targetCalories;

        const card = document.createElement('div');
        card.className = 'day-card';
        if (isToday(day)) card.classList.add('today');
        if (state.selectedDate === key) card.classList.add('selected');
        if (isOverLimit) card.classList.add('over-limit');

        // Header
        const header = document.createElement('div');
        header.className = 'day-header';
        header.innerHTML = `
            <span class="day-name">${DAY_NAMES[day.getDay()]}</span>
            <span class="day-number">${day.getDate()}</span>
        `;
        card.appendChild(header);

        // Meals list
        const mealsList = document.createElement('div');
        mealsList.className = 'meals-list';
        meals.forEach(meal => {
            const chip = document.createElement('div');
            chip.className = 'meal-chip';
            chip.dataset.type = meal.type;
            chip.innerHTML = `
                <div class="meal-type-dot"></div>
                <span class="chip-name">${escHtml(meal.name)}</span>
                <div class="chip-actions">
                    <button class="edit-chip"   title="Edit"   data-id="${meal.id}" data-date="${key}"><i class="fas fa-pen"></i></button>
                    <button class="delete-chip" title="Delete" data-id="${meal.id}" data-date="${key}"><i class="fas fa-trash"></i></button>
                </div>
            `;
            mealsList.appendChild(chip);
        });
        if (getMeals(key).length > 4) {
            const more = document.createElement('div');
            more.style.cssText = 'font-size:.72rem;color:var(--text-muted);text-align:center;padding:2px 0';
            more.textContent = `+${getMeals(key).length - 4} more`;
            mealsList.appendChild(more);
        }
        card.appendChild(mealsList);

        // Add hint
        const hint = document.createElement('div');
        hint.className = 'add-meal-hint';
        hint.innerHTML = '<i class="fas fa-plus"></i> Add meal';
        card.appendChild(hint);

        // Events
        card.addEventListener('click', e => {
            if (e.target.closest('.chip-actions')) return;
            openPanel(key, day);
        });

        card.querySelectorAll('.edit-chip').forEach(btn => {
            btn.addEventListener('click', e => {
                e.stopPropagation();
                openPanel(btn.dataset.date, day);
                setTimeout(() => startEdit(btn.dataset.id, btn.dataset.date), 100);
            });
        });

        card.querySelectorAll('.delete-chip').forEach(btn => {
            btn.addEventListener('click', async e => {
                e.stopPropagation();
                await removeMeal(btn.dataset.date, btn.dataset.id);
                renderGrid();
                if (state.selectedDate === btn.dataset.date) renderPanelMeals();
            });
        });

        grid.appendChild(card);
    });
}
// ─────────────────────────────────────────────
//  PANEL
// ─────────────────────────────────────────────
function openPanel(dateKey, dayObj) {
    state.selectedDate = dateKey;
    state.activeFilter = 'all';

    document.getElementById('panelDayTitle').textContent = FULL_DAYS[dayObj.getDay()];
    document.getElementById('panelDayDate').textContent  = formatFullDate(dayObj);

    // Reset filter tabs
    document.querySelectorAll('.type-tab').forEach(t => t.classList.remove('active'));
    document.querySelector('.type-tab[data-filter="all"]').classList.add('active');

    hideForm();
    renderPanelMeals();

    document.getElementById('sidePanel').classList.add('open');
    document.getElementById('panelOverlay').classList.add('open');
    renderGrid(); // re-render to show selected state
}

function closePanel() {
    state.selectedDate = null;
    document.getElementById('sidePanel').classList.remove('open');
    document.getElementById('panelOverlay').classList.remove('open');
    hideForm();
    renderGrid();
}

function renderPanelMeals() {
    const key = state.selectedDate;
    const totalCalories = getTotalCalories(key);
    if (!key) return;
    let meals = getMeals(key);
    if (state.activeFilter !== 'all') meals = meals.filter(m => m.type === state.activeFilter);

    const container = document.getElementById('panelMeals');
    container.innerHTML = '';

    const overLimit = state.targetCalories > 0 && totalCalories > state.targetCalories;
    const totalBar = document.createElement('div');
    totalBar.style.cssText = `
        background: ${overLimit ? '#fdecea' : '#f1f8e9'};
        color: ${overLimit ? '#b71c1c' : '#33691e'};
        padding: 8px 12px;
        border-radius: 10px;
        margin-bottom: 10px;
        text-align: center;
        font-weight: 600;
        border: ${overLimit ? '1.5px solid #ef9a9a' : '1.5px solid #c5e1a5'};
    `;
    totalBar.innerHTML = overLimit
        ? `<i class="fas fa-exclamation-triangle" style="margin-right:6px"></i>Over limit! ${totalCalories} / ${state.targetCalories} cal`
        : `Total: ${totalCalories} cal${state.targetCalories > 0 ? ' / ' + state.targetCalories + ' cal' : ''}`;
    container.appendChild(totalBar);

    if (meals.length === 0) {
        container.innerHTML += `
            <div class="no-meals-msg">
                <i class="fas fa-utensils"></i>
                No ${state.activeFilter === 'all' ? '' : state.activeFilter + ' '}meals yet
            </div>`;
        return;
    }

    meals.forEach(meal => {
        const row = document.createElement('div');
        row.className = 'panel-meal-row';
        row.dataset.type = meal.type;
        row.innerHTML = `
            <span class="type-badge">${meal.type}</span>
            <span class="meal-name">${escHtml(meal.name)} (${meal.calories || 200} cal)</span>
            <div class="row-actions">
                <button class="btn-edit"   title="Edit"   data-id="${meal.id}"><i class="fas fa-pen"></i></button>
                <button class="btn-delete" title="Delete" data-id="${meal.id}"><i class="fas fa-trash"></i></button>
            </div>
        `;
        row.querySelector('.btn-edit').addEventListener('click', () => startEdit(meal.id, key));
        row.querySelector('.btn-delete').addEventListener('click', async () => {
            await removeMeal(key, meal.id);
            renderPanelMeals();
            renderGrid();
        });
        container.appendChild(row);
    });
}
// ─────────────────────────────────────────────
//  FORM
// ─────────────────────────────────────────────
function showForm(title = 'Add Meal') {
    document.getElementById('formTitle').textContent = title;
    document.getElementById('mealForm').style.display = 'block';
    document.getElementById('duplicateWarning').classList.remove('show');
    document.getElementById('mealNameInput').focus();
}
function hideForm() {
    document.getElementById('mealForm').style.display = 'none';
    document.getElementById('mealNameInput').value = '';
    document.getElementById('mealTypeInput').value = 'breakfast';
    document.getElementById('editMealId').value = '';
    document.getElementById('duplicateWarning').classList.remove('show');
    document.getElementById('mealCaloriesInput').value = 200;
}
function startEdit(mealId, dateKey) {
    const meal = getMeals(dateKey).find(m => m.id === mealId);
    if (!meal) return;
    document.getElementById('editMealId').value   = mealId;
    document.getElementById('mealNameInput').value = meal.name;
    document.getElementById('mealTypeInput').value = meal.type;
    document.getElementById('mealCaloriesInput').value = meal.calories || 200;
    showForm('Edit Meal');
}

// ─────────────────────────────────────────────
//  EVENTS
// ─────────────────────────────────────────────

// Week navigation
document.getElementById('prevWeek').addEventListener('click', async () => {
    state.currentWeekOffset--;
    await loadMealsFromFirebase();
});
document.getElementById('nextWeek').addEventListener('click', async () => {
    state.currentWeekOffset++;
    await loadMealsFromFirebase();
});
document.getElementById('todayBtn').addEventListener('click', async () => {
    state.currentWeekOffset = 0;
    await loadMealsFromFirebase();
});

// Week-start toggle
document.getElementById('weekStartToggle').addEventListener('click', async e => {
    const btn = e.target.closest('span[data-value]');
    if (!btn) return;
    state.weekStartsOn = btn.dataset.value;
    document.querySelectorAll('#weekStartToggle span').forEach(s => s.classList.remove('active'));
    btn.classList.add('active');
    await loadMealsFromFirebase();
});

// Panel close
document.getElementById('panelClose').addEventListener('click', closePanel);
document.getElementById('panelOverlay').addEventListener('click', closePanel);

// Type filter tabs
document.getElementById('typeTabs').addEventListener('click', e => {
    const tab = e.target.closest('.type-tab');
    if (!tab) return;
    state.activeFilter = tab.dataset.filter;
    document.querySelectorAll('.type-tab').forEach(t => t.classList.remove('active'));
    tab.classList.add('active');
    renderPanelMeals();
});

// Show add form
document.getElementById('showAddForm').addEventListener('click', () => {
    document.getElementById('editMealId').value = '';
    document.getElementById('mealNameInput').value = '';
    document.getElementById('mealTypeInput').value = 'breakfast';
    showForm('Add Meal');
});

// Cancel form
document.getElementById('cancelFormBtn').addEventListener('click', hideForm);

// Save meal (with duplicate prevention)
document.getElementById('saveMealBtn').addEventListener('click', async () => {
    const name = document.getElementById('mealNameInput').value.trim();
    const type = document.getElementById('mealTypeInput').value;
    const caloriesInput = document.getElementById('mealCaloriesInput').value;
    const calories = caloriesInput ? parseInt(caloriesInput) : 200;
    const editId = document.getElementById('editMealId').value;
    const dateKey = state.selectedDate;

    if (!name) {
        document.getElementById('mealNameInput').style.borderColor = 'var(--primary)';
        document.getElementById('mealNameInput').focus();
        return;
    }
    document.getElementById('mealNameInput').style.borderColor = '';

    let success;
    if (editId) {
        success = await updateMeal(dateKey, editId, { name, type, calories });
    } else {
        success = await addMeal(dateKey, { id: uid(), name, type, calories });
    }

    if (success) {
        hideForm();
        renderPanelMeals();
        renderGrid();
    }
});

// Enter key in name input
document.getElementById('mealNameInput').addEventListener('keydown', e => {
    if (e.key === 'Enter') document.getElementById('saveMealBtn').click();
    if (e.key === 'Escape') hideForm();
});

// ─────────────────────────────────────────────
//  AUTH & INIT
// ─────────────────────────────────────────────
onAuthStateChanged(auth, async (user) => {
    if (user) {
        state.currentUser = user;
        console.log('User logged in:', user.uid);
        const snapshot = await get(ref(database, `users/${user.uid}`));
        if (snapshot.exists()) {
            state.targetCalories = snapshot.val().targetCalories || 0;
        }
        await loadMealsFromFirebase();
    } else {
        state.currentUser = null;
        state.meals = {};
        console.log('User not logged in');
        // Show auth required message or redirect
        document.getElementById('weekGrid').innerHTML = `
            <div class="auth-required" style="grid-column: 1 / -1;">
                <i class="fas fa-user-lock"></i>
                <p>Please <a href="../index.html">log in</a> to access your meal planner.</p>
            </div>
        `;
    }
});


// ─────────────────────────────────────────────
//  REUSE LAST WEEK
// ─────────────────────────────────────────────
function showToast(message) {
    const toast = document.getElementById('reuseToast');
    toast.textContent = message;
    toast.classList.add('show');
    setTimeout(() => toast.classList.remove('show'), 3000);
}

async function reuseLastWeek() {
    if (!state.currentUser) return;

    const btn = document.getElementById('reuseLastWeekBtn');
    btn.disabled = true;
    btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Loading…';

    try {
        const lastWeekId   = getWeekId(state.currentWeekOffset - 1);
        const lastWeekPath = `users/${state.currentUser.uid}/WeeklyPlanner/${lastWeekId}`;
        const snapshot     = await get(ref(database, lastWeekPath));

        if (!snapshot.exists() || !snapshot.val().days) {
            showToast('No meals found for last week.');
            return;
        }

        const lastWeekData = snapshot.val().days;
        const currentDays  = getWeekDays(state.currentWeekOffset);
        let addedCount = 0, skippedCount = 0;

        FULL_DAYS.forEach((fullDayName, dayIndex) => {
            const dayKey      = fullDayName.toLowerCase();
            const dateKey     = toKey(currentDays[dayIndex]);
            const lastMeals   = lastWeekData[dayKey];
            if (!lastMeals) return;

            Object.values(lastMeals).forEach(meal => {
                const alreadyExists = (state.meals[dateKey] || []).some(
                    m => m.name.toLowerCase() === meal.name.toLowerCase() && m.type === meal.type
                );
                if (alreadyExists) { skippedCount++; return; }
                if (!state.meals[dateKey]) state.meals[dateKey] = [];
                state.meals[dateKey].push({
                    id: uid(),
                    name: meal.name,
                    type: meal.type,
                    calories: meal.calories || 200
                });
                addedCount++;
            });
        });

        if (addedCount > 0) await saveMealsToFirebase();
        renderGrid();

        if (addedCount === 0 && skippedCount > 0)
            showToast('This week already has all of last week\'s meals.');
        else if (addedCount > 0 && skippedCount === 0)
            showToast(`${addedCount} meal${addedCount > 1 ? 's' : ''} copied from last week!`);
        else if (addedCount > 0 && skippedCount > 0)
            showToast(`${addedCount} added, ${skippedCount} skipped (already existed).`);
        else
            showToast('No meals found for last week.');

    } catch (err) {
        console.error('reuseLastWeek error:', err);
        showToast('Something went wrong. Please try again.');
    } finally {
        btn.disabled = false;
        btn.innerHTML = '<i class="fas fa-rotate-left"></i> Reuse Last Week';
    }
}

document.getElementById('reuseLastWeekBtn').addEventListener('click', reuseLastWeek);

// Initial render (will be updated after auth check)
renderGrid();

function getTotalCalories(dateKey) {
    return (state.meals[dateKey] || [])
        .reduce((sum, m) => sum + (m.calories || 200), 0);
}
</script>

<div class="reuse-toast" id="reuseToast"></div>
</body>
